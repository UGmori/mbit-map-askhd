      <main class="max-w-3xl mx-auto px-4 sm:px-6 pb-16">

        <!-- ヒーローセクション -->
        <header class="py-8 md:py-10 text-center">

            ${data.group}
          </div>
          <h1 class="text-3xl md:text-4xl font-black text-slate-800 mb-3 tracking-tight">
            <span style="color:${c.primary}">${typeKey}</span>（${data.name}）

          <p class="text-base md:text-lg font-bold text-slate-600 mb-8 leading-relaxed">
            ${data.tagline}<br>
            <span class="inline-block text-white px-3 py-0.5 rounded-md mt-2 shadow-sm text-sm" style="background-color:${c.primary}">${data.name}</span>

          <div class="relative w-56 h-56 md:w-72 md:h-72 mx-auto mb-6 rounded-2xl overflow-hidden shadow-xl border-4 border-white">

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 mb-8 relative overflow-hidden">

          <p class="text-slate-700 text-sm md:text-base leading-loose font-medium pl-2">
            ${data.description}

          <h2 class="text-xl md:text-2xl font-black text-slate-800 mb-6 flex items-start gap-2">
            <span class="text-2xl flex-shrink-0 leading-tight">👀</span>
            <span class="leading-snug">${typeKey}の「あるある」行動パターン<br><span class="text-xs text-slate-400 font-bold">（職場編）</span></span>
          </h2>
          <div class="space-y-4">${behaviorCards}</div>
        </section>

        <div class="border-t-2 border-dashed border-slate-200 my-8"></div>

        <!-- 強み -->
        <section class="rounded-3xl p-8 md:p-10 shadow-xl text-white mb-8" style="background: linear-gradient(135deg, ${c.primary}, ${c.dark})">
          <h2 class="text-xl md:text-2xl font-black mb-8 pb-3 border-b-2 border-white/20 flex items-start gap-2 text-white">
            <span class="flex-shrink-0 leading-tight">⭐</span>
            <span>本人の武器：職場で発揮する３つの強み</span>
          </h2>
          <div class="space-y-5">${strengthCards}</div>
        </section>

        <!-- 弱点 -->
        <section class="mb-8 rounded-3xl p-6 md:p-8 border border-orange-100" style="background-color: rgba(255,247,237,0.7)">
          <h2 class="text-xl md:text-2xl font-black mb-6 pb-3 border-b-2 border-orange-200 flex items-start gap-2 text-orange-800">
            <span class="flex-shrink-0 leading-tight">⚠️</span>
            <span>本人が抱えやすい弱点（周囲がサポートすべき点）</span>
          </h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">${weaknessCards}</div>
        </section>

        <!-- 成長ポイント & SUMMARY -->
        <section class="mb-10 bg-white border border-slate-200 rounded-3xl p-6 md:p-8 shadow-sm">
          <h2 class="text-xl md:text-2xl font-black text-slate-800 mb-8 flex items-start gap-2 border-b border-slate-100 pb-4">
            <span class="flex-shrink-0 leading-tight">🧭</span>
            <span>このタイプの成長ポイント</span>
          </h2>
          <div class="space-y-8">${growthPointItems}</div>
          <div class="mt-10 flex justify-center">
            <div class="bg-slate-50 border-y border-slate-200 py-4 px-8 text-center max-w-md w-full">
              <span class="block text-[9px] font-black tracking-[0.25em] mb-1" style="color:${c.primary}">SUMMARY</span>
              <p class="text-xs font-black text-slate-600 leading-relaxed">${data.summary || ''}</p>
            </div>
          </div>
        </section>

        <!-- 接し方 -->
        <section class="mb-10">
          <h2 class="text-xl md:text-2xl font-black mb-6 pb-3 border-b-2 flex items-start gap-2" style="color:${c.primary}; border-color:${c.border}">
            <span class="flex-shrink-0 leading-tight">🤝</span>
            <span>周りのメンバーはどう接するべき？</span>
          </h2>
          <div class="space-y-4">${commCards}</div>
        </section>

        <!-- 有名人 -->
        <section class="mb-12">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
            <h3 class="font-black text-slate-700 text-base md:text-lg mb-1 flex items-center">
              <span class="mr-2 text-xl">👑</span> 同じタイプの有名人
            </h3>
            <p class="text-xs text-slate-400 font-bold mb-5 ml-8">このタイプと同じ個性を持つとされる人たちです</p>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">${celebCards}</div>
          </div>
        </section>

        <!-- CTA -->
        <section class="mb-8 relative overflow-hidden rounded-3xl bg-gradient-to-br from-slate-800 to-slate-900 text-white shadow-2xl">
          <div class="absolute -right-10 -top-10 w-48 h-48 rounded-full blur-3xl opacity-20 pointer-events-none" style="background-color:${c.primary}"></div>
          <div class="absolute -left-10 -bottom-10 w-40 h-40 rounded-full blur-3xl opacity-15 pointer-events-none" style="background-color:${c.accent}"></div>
          <div class="relative p-8 md:p-10 text-center">
            <h2 class="text-xl md:text-2xl font-black mb-3 leading-tight">
              お互いの強みを知れば、<br class="md:hidden">チームはもっと強くなる。
            </h2>
            <p class="text-slate-300 text-sm md:text-base font-medium mb-6 max-w-lg mx-auto leading-relaxed">
              自分のタイプを共有して、チームメンバーとの円滑なコミュニケーションに活かしましょう！
            </p>
            <a href="index.html" class="inline-flex items-center justify-center font-black text-base py-3 px-8 rounded-full shadow-lg transition-all hover:-translate-y-1 hover:shadow-xl" style="background: linear-gradient(to right, #f59e0b, #f97316); color: #1e293b">
              スタイルマップに戻る
              <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </a>
          </div>
        </section>

      </main>
    </div>
  `;
}

// URL パラメータからタイプを取得
const params = new URLSearchParams(window.location.search);
const typeKey = (params.get('type') || 'INTP').toUpperCase();
render(typeKey);
</script>
